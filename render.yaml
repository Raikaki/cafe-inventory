# Render Blueprint (https://render.com) — Docker web service.
# Database: free MySQL on Aiven (https://aiven.io). Aiven requires SSL.
#   DB_URL example:
#   jdbc:mysql://mysql-xxxxx.aivencloud.com:PORT/defaultdb?sslMode=REQUIRED&serverTimezone=UTC
#   DB_USERNAME=avnadmin   DB_PASSWORD=<from Aiven console>
#
# Deploy: push this repo to GitHub, then on Render -> "New +" -> "Blueprint",
# select the repo. Fill the DB_URL / DB_USERNAME / DB_PASSWORD values.
services:
  - type: web
    name: cafe-inventory
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login
    envVars:
      - key: DB_URL
        value: jdbc:mysql://webcafe20260623-web-cafe.h.aivencloud.com:20339/defaultdb?sslMode=REQUIRED&serverTimezone=UTC
      - key: DB_USERNAME
        value: avnadmin
      - key: DB_PASSWORD
        sync: false      # paste the Aiven password in the Render dashboard (kept out of git)
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false      # set your admin login password
      - key: DB_POOL_SIZE
        value: "3"
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=70.0
      - key: PORT
        value: "8080"
